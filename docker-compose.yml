version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventflow_postgres
    environment:
      POSTGRES_USER: eventflow
      POSTGRES_PASSWORD: eventflow
      POSTGRES_DB: eventflow
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U eventflow",]
      interval: 5s
      timeout: 5s

  redis:
    image: redis:7-alpine
    container_name: eventflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
volumes:
  postgres_data:
  redis_data:

  
    
